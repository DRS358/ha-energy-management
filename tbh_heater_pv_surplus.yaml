alias: TBH Heater — PV Surplus to DHW
description: >
  Turns on the water heater when battery is full and PV surplus exceeds heater
  demand. Maintains operation while surplus holds. Turns off immediately if
  water temperature exceeds 70°C or surplus drops for more than 5 minutes.
triggers:
  - minutes: /1
    trigger: time_pattern
  - trigger: numeric_state
    entity_id: sensor.heatpump_water_tank_temperature_t5
    above: 70
actions:
  - choose:
      # PRIORITY 1: Overheat protection — turn off immediately
      - conditions:
          - condition: numeric_state
            entity_id: sensor.heatpump_water_tank_temperature_t5
            above: 70
        sequence:
          - target:
              entity_id: switch.tbh_grzalka_odwrocony
            action: switch.turn_off

      # PRIORITY 2: Turn ON — heater is off, battery full, real PV surplus available
      - conditions:
          - condition: state
            entity_id: switch.tbh_grzalka_odwrocony
            state: "off"
          - condition: numeric_state
            entity_id: sensor.heatpump_water_tank_temperature_t5
            below: 70
          - condition: numeric_state
            entity_id: sensor.deye_sun_12k_battery
            above: 97
          - condition: template
            value_template: >
              {% set pv = states('sensor.deye_sun_12k_microinverter_power') | float %}
              {% set load = states('sensor.deye_sun_12k_load_power') | float %}
              {{ (pv - load) > 2500 }}
        sequence:
          - target:
              entity_id: switch.tbh_grzalka_odwrocony
            action: switch.turn_on

      # PRIORITY 3: Keep ON — heater is running, battery still acceptable
      - conditions:
          - condition: state
            entity_id: switch.tbh_grzalka_odwrocony
            state: "on"
          - condition: numeric_state
            entity_id: sensor.heatpump_water_tank_temperature_t5
            below: 70
          - condition: numeric_state
            entity_id: sensor.deye_sun_12k_battery
            above: 95
          - condition: template
            value_template: >
              {% set pv = states('sensor.deye_sun_12k_microinverter_power') | float %}
              {% set load = states('sensor.deye_sun_12k_load_power') | float %}
              {{ (pv - load) > 0 }}
        sequence:
          - target:
              entity_id: switch.tbh_grzalka_odwrocony
            action: switch.turn_on

      # PRIORITY 4: Conditions not met — wait 5 min then re-evaluate before turning off
      - conditions:
          - condition: state
            entity_id: switch.tbh_grzalka_odwrocony
            state: "on"
        sequence:
          - delay: "00:05:00"
          - choose:
              # Re-check: if conditions recovered within 5 min — keep running
              - conditions:
                  - condition: numeric_state
                    entity_id: sensor.deye_sun_12k_battery
                    above: 95
                  - condition: numeric_state
                    entity_id: sensor.heatpump_water_tank_temperature_t5
                    below: 70
                  - condition: template
                    value_template: >
                      {% set pv = states('sensor.deye_sun_12k_microinverter_power') | float %}
                      {% set load = states('sensor.deye_sun_12k_load_power') | float %}
                      {{ (pv - load) > 0 }}
                sequence:
                  - target:
                      entity_id: switch.tbh_grzalka_odwrocony
                    action: switch.turn_on
            default:
              # Conditions not recovered — turn off
              - target:
                  entity_id: switch.tbh_grzalka_odwrocony
                action: switch.turn_off
    default: []
mode: single
